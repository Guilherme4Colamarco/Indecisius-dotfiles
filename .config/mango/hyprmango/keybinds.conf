# Key Bindings — Indecisius Dotfiles
# Format: bind[flags]=MODIFIERS,KEY,COMMAND,PARAMETERS
# Modifiers: SUPER, CTRL, ALT, SHIFT, NONE
# Flags: l (lock screen), r (release), s (keysym), p (pass through)
# spawn = no shell; use spawn_shell for | && || $() &
#
# NOTA: Quickshell foi removido. Todos os atalhos qs/quickshell foram
# substituídos por rofi, wlogout, waybar ou scripts nativos.

# ==============================
# Core System
# ==============================
bind=SUPER,r,reload_config
bind=CTRL+SHIFT,r,reload_config
bind=SUPER,m,togglemaximizescreen
bind=SUPER,q,killclient

# ==============================
# Launchers (Rofi)
# ==============================
bind=SUPER,d,spawn,rofi -show drun
bind=SUPER,a,spawn,rofi -show drun -theme launchpad
bind=SUPER,grave,spawn,rofi -show window
bind=SUPER+SHIFT,D,spawn,rofi -show run

# ==============================
# Terminal
# ==============================
bind=SUPER,Return,spawn,kitty
bind=SUPER+SHIFT,Return,spawn,kitty

# ==============================
# Apps Frequentes
# ==============================
bind=SUPER,T,spawn,waypaper
# SUPER+C reservado para app futuro
# SUPER+M reservado para player de música

# ==============================
# Clipboard & Emoji
# ==============================
bind=SUPER,V,spawn_shell,pkill rofi || ~/.config/mango/scripts/clipboard-menu.sh
bind=SUPER+SHIFT,period,spawn_shell,pkill rofi || ~/.config/mango/scripts/emoji-menu.sh
bind=SUPER+SHIFT,C,spawn,hyprpicker -a

# ==============================
# Window Focus (Vim motions)
# ==============================
bind=SUPER,h,focusdir,left
bind=SUPER,j,focusdir,down
bind=SUPER,k,focusdir,up
bind=SUPER,l,focusdir,right
bind=ALT,Tab,focusstack,next

# ==============================
# Window Management
# ==============================
bind=SUPER+SHIFT,h,movewindow,left
bind=SUPER+SHIFT,j,movewindow,down
bind=SUPER+SHIFT,k,movewindow,up
bind=SUPER+SHIFT,l,movewindow,right

bind=SUPER+SHIFT,Space,togglefloating
bind=SUPER,f,togglefullscreen
bind=SUPER+SHIFT,f,togglefakefullscreen
bind=SUPER,i,minimized
bind=SUPER+SHIFT,I,restore_minimized
bind=SUPER,o,toggleoverlay
bind=SUPER,g,toggleglobal
bind=SUPER,z,toggle_scratchpad

# Mango overview
bind=SUPER,Tab,toggleoverview
bind=SUPER+SHIFT,O,toggleoverview

# ==============================
# Layouts
# ==============================
bind=SUPER,n,spawn,~/.config/mango/scripts/layout-menu.sh
bind=SUPER+ALT,n,switch_layout
bind=SUPER,comma,set_proportion,1.0
bind=SUPER,period,switch_proportion_preset,
bind=SUPER+SHIFT,bracketleft,incgaps,-1
bind=SUPER+SHIFT,bracketright,incgaps,1
bind=SUPER+SHIFT,backslash,togglegaps

# Direct layout shortcuts — família vertical
bind=SUPER+ALT+SHIFT,1,spawn_shell,mmsg -s -l RT
bind=SUPER+ALT+SHIFT,2,spawn_shell,mmsg -s -l VS
bind=SUPER+ALT+SHIFT,3,spawn_shell,mmsg -s -l VT
bind=SUPER+ALT+SHIFT,4,spawn_shell,mmsg -s -l VG
bind=SUPER+ALT+SHIFT,5,spawn_shell,mmsg -s -l VK
bind=SUPER+ALT,7,spawn_shell,mmsg -s -l K

# ==============================
# Move & Resize Windows
# ==============================
bind=SUPER+CTRL,h,movewin,-50,+0
bind=SUPER+CTRL,j,movewin,+0,+50
bind=SUPER+CTRL,k,movewin,+0,-50
bind=SUPER+CTRL,l,movewin,+50,+0

bind=SUPER+ALT,h,resizewin,-50,+0
bind=SUPER+ALT,j,resizewin,+0,+50
bind=SUPER+ALT,k,resizewin,+0,-50
bind=SUPER+ALT,l,resizewin,+50,+0

# ==============================
# Workspace (Tag) Management
# ==============================
bind=SUPER,1,view,1,0
bind=SUPER,2,view,2,0
bind=SUPER,3,view,3,0
bind=SUPER,4,view,4,0
bind=SUPER,5,view,5,0
bind=SUPER,6,view,6,0
bind=SUPER,7,view,7,0
bind=SUPER,8,view,8,0
bind=SUPER,9,view,9,0

bind=SUPER+SHIFT,1,tag,1,0
bind=SUPER+SHIFT,2,tag,2,0
bind=SUPER+SHIFT,3,tag,3,0
bind=SUPER+SHIFT,4,tag,4,0
bind=SUPER+SHIFT,5,tag,5,0
bind=SUPER+SHIFT,6,tag,6,0
bind=SUPER+SHIFT,7,tag,7,0
bind=SUPER+SHIFT,8,tag,8,0
bind=SUPER+SHIFT,9,tag,9,0

bind=SUPER,Left,viewtoleft,0
bind=SUPER+CTRL,Left,viewtoleft_have_client,0
bind=SUPER,Right,viewtoright,0
bind=SUPER+CTRL,Right,viewtoright_have_client,0
bind=SUPER+SHIFT,Left,tagtoleft,0
bind=SUPER+SHIFT,Right,tagtoright,0

# ==============================
# Monitor Navigation
# ==============================
bind=SUPER+CTRL,Up,focusmon,left
bind=SUPER+CTRL,Down,focusmon,right
bind=SUPER+ALT,Left,tagmon,left
bind=SUPER+ALT,Right,tagmon,right

# ==============================
# Barra & Utils
# ==============================
bind=SUPER,B,spawn,killall -SIGUSR1 waybar || waybar
bind=SUPER,BackSpace,spawn,pkill wlogout || wlogout

# ==============================
# Wallpaper (awww)
# ==============================
bind=SUPER,W,spawn,~/.config/mango/scripts/wallpaper-random.sh
bind=SUPER+SHIFT,W,spawn,waypaper
bind=SUPER+ALT,W,spawn_shell,curl -s wttr.in/?format=%l:+%c+%t | xargs notify-send "Clima" &

# ==============================
# Screenshots
# ==============================
bind=SUPER+SHIFT,S,spawn_shell,grim -g "$(slurp)" - | wl-copy --type image/png && ~/.config/mango/scripts/screenshot-sound.sh
bind=SUPER+SHIFT,R,spawn_shell,mkdir -p ~/Pictures/Screenshots && grim -g "$(slurp)" ~/Pictures/Screenshots/Screenshot_$(date '+%Y-%m-%d_%H-%M-%S').png && ~/.config/mango/scripts/screenshot-sound.sh
bind=SUPER+SHIFT+ALT,S,spawn_shell,grim -g "$(slurp)" - | swappy -f - && ~/.config/mango/scripts/screenshot-sound.sh
bind=SUPER,Print,spawn_shell,grim - | wl-copy --type image/png && ~/.config/mango/scripts/screenshot-sound.sh
bind=SUPER+CTRL,Print,spawn_shell,mkdir -p ~/Pictures/Screenshots && grim ~/Pictures/Screenshots/Screenshot_$(date '+%Y-%m-%d_%H-%M-%S').png && ~/.config/mango/scripts/screenshot-sound.sh
bind=SUPER+SHIFT,T,spawn_shell,grim -g "$(slurp)" - | tesseract - - | wl-copy && ~/.config/mango/scripts/screenshot-sound.sh
bind=NONE,Print,spawn_shell,grim - | wl-copy --type image/png && ~/.config/mango/scripts/screenshot-sound.sh
bind=SUPER,Scroll_Lock,spawn,~/.config/mango/scripts/screenshot-menu.sh --file
bind=CTRL,Print,spawn,~/.config/mango/scripts/screenshot-menu.sh

# ==============================
# Media Keys
# ==============================
bind=NONE,XF86AudioMute,spawn,wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind=SUPER,XF86AudioMute,spawn,wpctl set-mute @DEFAULT_SOURCE@ toggle
bind=SUPER+CTRL+SHIFT,m,spawn,wpctl set-volume @DEFAULT_AUDIO_SINK@ 0%
bind=NONE,XF86AudioRaiseVolume,spawn,wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bind=NONE,XF86AudioLowerVolume,spawn,wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-

bind=NONE,XF86MonBrightnessUp,spawn,brightnessctl set +5%
bind=NONE,XF86MonBrightnessDown,spawn,brightnessctl set 5%-

# ==============================
# System & Session
# ==============================
bind=CTRL+SHIFT+ALT+SUPER,Delete,spawn_shell,systemctl poweroff || loginctl poweroff

# Reload on release
bindr=CTRL+SUPER+ALT,r,reload_config

# ==============================
# Mouse Bindings
# ==============================
mousebind=SUPER,btn_left,moveresize,curmove
mousebind=SUPER,btn_right,moveresize,curresize

# ==============================
# Axis Bindings
# ==============================
axisbind=SUPER,UP,viewtoleft_have_client
axisbind=SUPER,DOWN,viewtoright_have_client
