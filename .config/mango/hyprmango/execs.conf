# Startup — mango uses exec-once=command (no Hyprland exec arrays). Use sh -c for shell operators.

# Waybar (traditional rice bar)
exec-once=waybar -c ~/.config/waybar/MangoWC/config.jsonc -s ~/.config/waybar/MangoWC/style.css

# Clipboard history
# Clipboard history (modo simples, igual inir)
exec-once=wl-paste --watch cliphist store

# Core (authentication)
exec-once=gnome-keyring-daemon --start --components=secrets
# One polkit agent is enough; install mate OR gnome, not both required at once
exec-once=sh -c 'if [ -x /usr/libexec/polkit-mate-authentication-agent-1 ]; then exec /usr/libexec/polkit-mate-authentication-agent-1; elif [ -x /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1 ]; then exec /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1; fi'

# DBus / portals
exec-once=dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once=/usr/libexec/xdg-desktop-portal
exec-once=/usr/libexec/xdg-desktop-portal-wlr

# X11 apps: relax local X access (optional; tighten if you do not need it)
exec-once=sh -c 'xhost +local: 2>/dev/null || true'

# Solaar — Logitech mouse daemon (background, hidden window)
exec-once=solaar -w hide

# Wallpaper daemon (awww — successor to swww)
exec-once=awww-daemon
exec-once=sh -c 'sleep 1 && awww restore || awww img ~/Imagens/Wallpapers/$(ls ~/Imagens/Wallpapers | shuf -n 1)'

# Notifications daemon
exec-once=mako
