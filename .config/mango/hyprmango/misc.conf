# Miscellaneous settings

# Focus behavior
focus_on_activate = 1
sloppyfocus = 1
warpcursor = 1
focus_cross_monitor = 0
focus_cross_tag = 0

# Window behavior
no_border_when_single = 1
idleinhibit_ignore_visible = 0
drag_tile_to_tile = 1
enable_floating_snap = 0
snap_distance = 30

# Move feedback - visual indication when moving windows
border_on_move = 1
move_indicator_color = rgba(122, 162, 247, 0.5)

# Cursor
cursor_size = 24
axis_bind_apply_timeout = 100

# Overview
hotarea_size = 10
enable_hotarea = 1
ov_tab_mode = 0
overviewgappi = 5
overviewgappo = 30

# XWayland persistence (0/1; relogin to apply). See wiki Miscellaneous Settings.
xwayland_persistence=1
