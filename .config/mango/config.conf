# Main mango config - sources modular configuration files
# Place customizations in ~/.config/mango/custom/
# To always use this tree (never /etc/mango fallback): install the session file:
#   mkdir -p ~/.local/share/wayland-sessions && cp ~/.config/mango/mango.desktop ~/.local/share/wayland-sessions/

# Monitor configuration (must be loaded first)
source=~/.config/mango/monitors.conf

# Core configuration modules
source=~/.config/mango/hyprmango/env.conf
source=~/.config/mango/hyprmango/execs.conf
source=~/.config/mango/hyprmango/input.conf
source=~/.config/mango/hyprmango/binds.conf
source=~/.config/mango/hyprmango/layout.conf
source=~/.config/mango/hyprmango/colors.matugen.conf
source=~/.config/mango/hyprmango/colors.conf
source=~/.config/mango/hyprmango/decoration.conf
source=~/.config/mango/hyprmango/animations.conf
source=~/.config/mango/hyprmango/misc.conf
source=~/.config/mango/hyprmango/keybinds.conf
source=~/.config/mango/hyprmango/rules.conf

# Custom user overrides (load last to take precedence)
source=~/.config/mango/custom/env.conf
source=~/.config/mango/custom/execs.conf
source=~/.config/mango/custom/general.conf
source=~/.config/mango/custom/rules.conf
source=~/.config/mango/custom/keybinds.conf
