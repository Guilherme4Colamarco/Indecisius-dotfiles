# Main mango config - sources modular configuration files
# Place customizations in ~/.config/mango/custom/
# To always use this tree (never /etc/mango fallback): install the session file:
#   mkdir -p ~/.local/share/wayland-sessions && cp ~/.config/mango/mango.desktop ~/.local/share/wayland-sessions/

# Monitor configuration (must be loaded first when present)
source-optional=~/.config/mango/monitors.conf

# Core configuration modules
source=~/.config/mango/configs/env.conf
source=~/.config/mango/configs/execs.conf
source=~/.config/mango/configs/input.conf
source=~/.config/mango/configs/layout.conf
source=~/.config/mango/configs/colors.conf
source=~/.config/mango/configs/decoration.conf
source=~/.config/mango/configs/animations.conf
source=~/.config/mango/configs/misc.conf
source=~/.config/mango/configs/keybinds.conf
source=~/.config/mango/configs/rules.conf

# Custom user overrides (load last to take precedence)
source-optional=~/.config/mango/custom/nwg-look-mango.conf
source-optional=~/.config/mango/custom/nwg-look-env.conf
source-optional=~/.config/mango/custom/keybinds.conf
source-optional=~/.config/mango/custom/misc.conf
