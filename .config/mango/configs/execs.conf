# Startup — mango uses exec-once=command (no Hyprland exec arrays). Use sh -c for shell operators.

# Waybar (traditional rice bar)
exec-once=waybar -c ~/.config/waybar/MangoWC/config.jsonc -s ~/.config/waybar/MangoWC/style.css

# Clipboard history — separate text/image watchers for reliable screenshot/browser images
# Keep these as plain exec-once lines: the combined `sh -c` + `pkill` variant can leave no watcher alive after reload/session quirks.
exec-once=wl-paste --type text --watch cliphist store
exec-once=wl-paste --type image --watch cliphist store

# Core (authentication)
exec-once=gnome-keyring-daemon --start --components=secrets
# Start the GNOME polkit agent for GUI auth prompts
exec-once=/usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1

# DBus / portals
exec-once=dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once=/usr/libexec/xdg-desktop-portal
exec-once=/usr/libexec/xdg-desktop-portal-wlr

# X11 apps: relax local X access (optional; tighten if you do not need it)
exec-once=sh -c 'xhost +local: 2>/dev/null || true'

# Solaar — Logitech mouse daemon (background, hidden window)
exec-once=solaar -w hide

# Wallpaper daemon (awww — successor to swww)
exec-once=awww-daemon
exec-once=sh -c 'sleep 1 && awww restore || awww img ~/Imagens/Wallpapers/$(ls ~/Imagens/Wallpapers | shuf -n 1)'
exec-once=sh -c 'sleep 2 && ~/.config/mango/scripts/wm/update-matugen-accent.sh'

# Notifications daemon
exec-once=mako
