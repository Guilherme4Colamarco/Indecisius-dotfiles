# Core configuration for mangowm
# Includes: effects, decorations, colors, theming, layouts, input

# ==============================
# Window Effects (scenefx)
# ==============================
blur = 1
# Layer-shell (dock, panels, quickshell, some launchers): needs blur_layer=1. Windows use blur=1 only.
blur_layer = 1
blur_optimized = 1
blur_params_num_passes = 5
blur_params_radius = 6
blur_params_noise = 0.05
blur_params_brightness = 0.9
blur_params_contrast = 0.9
blur_params_saturation = 1.2

shadows = 1
layer_shadows = 1
shadow_only_floating = 1
shadows_size = 20
shadows_blur = 15
shadows_position_x = 0
shadows_position_y = 0
shadowscolor = 0x0000002a

border_radius = 13
no_radius_when_single = 1
focused_opacity = 1.00
unfocused_opacity = 1.00

# ==============================
# Animations
# ==============================
animations = 1
layer_animations = 1
animation_type_open = slide
animation_type_close = slide
animation_fade_in = 1
animation_fade_out = 1
tag_animation_direction = 1
zoom_initial_ratio = 0.4
zoom_end_ratio = 0.8
fadein_begin_opacity = 0.5
fadeout_begin_opacity = 0.5
animation_duration_move = 500
animation_duration_open = 400
animation_duration_tag = 300
animation_duration_close = 800
animation_duration_focus = 0
animation_curve_open = 0.46,1.0,0.29,1
animation_curve_move = 0.46,1.0,0.29,1
animation_curve_tag = 0.46,1.0,0.29,1
animation_curve_close = 0.08,0.92,0,1
animation_curve_focus = 0.46,1.0,0.29,1
animation_curve_opafadeout = 0.5,0.5,0.5,0.5
animation_curve_opafadein = 0.46,1.0,0.29,1

# Colors, gaps, borderpx: ~/.config/mango/configs/colors.conf

cursor_theme = Bibata-Modern-Classic
cursor_size = 24

# Layout, focus/snap/overview, and scratchpad ratios live in layout.conf / misc.conf.
# Keep decoration.conf visual-only so later sourcing does not override layout toggles.

gappih = 5
gappiv = 5
gappoh = 10
gappov = 10
