# Window and layer rules

# Wofi menus - zoom animation for both open and close
layerrule=animation_type_open:zoom,layer_name:wofi
layerrule=animation_type_close:zoom,layer_name:wofi

# Slurp selection overlay - prevent blur to keep screenshots clear
layerrule=noblur:1,layer_name:selection
layerrule=noanim:1,layer_name:selection

# Note: Global blur_layer=1 enables blur for all layers.
# Use noblur:1 in layerrule to disable blur for specific layers.
